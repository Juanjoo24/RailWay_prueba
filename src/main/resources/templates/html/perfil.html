<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Mi Perfil | ZapaJuan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
body {
    background:#f5f6fa;
}
.profile-card {
    border-radius:15px;
}
.avatar {
    font-size:80px;
    color:#0d6efd;
}
.btn-back {
    text-transform: uppercase;
    letter-spacing: 1px;
}
</style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center fw-bold mb-4">
        <i class="bi bi-person-circle"></i> Mi Perfil
    </h2>

    <div class="card shadow profile-card mx-auto p-4" style="max-width:650px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-circle avatar"></i>
            <h5 class="mt-2" th:text="${nombreUsuario}">Usuario</h5>
            <p class="text-muted">Cuenta de cliente ZapaJuan</p>
        </div>

        <!-- Formulario de perfil -->
        <form th:action="@{/perfil/guardar}" method="post">

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person"></i> Nombre
                    </label>
                    <input type="text" class="form-control" name="nombre" th:value="${nombre}" placeholder="Tu nombre" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">
                        <i class="bi bi-person-badge"></i> Apellido
                    </label>
                    <input type="text" class="form-control" name="apellido" th:value="${apellido}" placeholder="Tu apellido" required>
                </div>

            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-envelope"></i> Email
                </label>
                <input type="email" class="form-control" name="email" th:value="${email}" placeholder="usuario@email.com" required>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-telephone"></i> Teléfono
                </label>
                <input type="text" class="form-control" name="telefono" th:value="${telefono}" placeholder="Tu teléfono" required>
            </div>

            <div class="mt-3">
                <label class="form-label">
                    <i class="bi bi-lock"></i> Nueva contraseña
                </label>
                <input type="password" class="form-control" name="password" placeholder="••••••••">
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save"></i> Guardar cambios
                </button>
            </div>

        </form>

        <div class="text-center mt-4">
            <a th:href="@{/bienvenida}" class="btn btn-outline-dark btn-back">
                <i class="bi bi-arrow-left"></i> Volver a la tienda
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
