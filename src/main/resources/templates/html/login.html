<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/form.css}">
    
    <title>Iniciar Sesión - ZapaJuan</title>
</head>
<body>
    <header class="py-4">
        <div class="container text-center">
            <a th:href="@{/}">
                <img th:src="@{/imagenes/logoTienda.png}" alt="Logo ZapaJuan" style="height: 80px; width: auto;">
            </a>
        </div>
    </header>
    
    <div class="container d-flex justify-content-center align-items-center mb-5">
        <div class="card shadow-lg" style="width: 100%; max-width: 450px; border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4 fw-bold">Bienvenido</h2>
                
                <form th:action="@{/login}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre de Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Entrar</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">¿No tienes una cuenta? 
                        <a th:href="@{/register}" class="text-decoration-none fw-bold">Regístrate aquí</a>
                    </p>
                    <hr>
                    <a th:href="@{/}" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
