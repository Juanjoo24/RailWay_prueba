<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="/css/form.css">
    
    <title>Iniciar sesión - ZapaJuan</title>
</head>
<body>  

    <header class="py-4">
        <div class="container text-center">
            <a href="/">
                <img src="/imagenes/logoTienda.png" alt="Logo ZapaJuan" style="height: 80px; width: auto;">
            </a>
        </div>
    </header>
    
    <div class="container d-flex justify-content-center align-items-center">
        <div class="card shadow-lg" style="width: 100%; max-width: 500px; border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4 fw-bold">Iniciar Sesión</h2>
                
                <form action="/login" method="post">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg" id="usuario" name="usuario" placeholder="Usuario" required>
                    </div>
                    
                    <div class="mb-4">
                        <input type="password" class="form-control form-control-lg" id="contrasena" name="contrasena" placeholder="Contraseña" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 shadow-sm">
                        <i class="bi bi-door-open me-2"></i>Entrar
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">¿No tienes una cuenta? 
                        <a href="/register" class="text-decoration-none fw-bold">Regístrate aquí</a>
                    </p>
                    <hr>
                    <a href="/" class="text-muted text-decoration-none small">
                        <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
