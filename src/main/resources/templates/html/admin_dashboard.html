<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ZapaJuan - Panel Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-gear-fill me-2"></i>Panel de Administración</span>
        <a th:href="@{/bienvenida}" class="btn btn-outline-light btn-sm">Volver a la Tienda</a>
    </div>
</nav>

<div class="container">
    <ul class="nav nav-pills mb-4 justify-content-center" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-usuarios">Usuarios</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-proveedores">Proveedores</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-zapas">Zapatillas</button></li>
    </ul>

    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade show active" id="tab-usuarios">
            <div class="card shadow-sm p-4">
                <h3>Gestión de Clientes</h3>
                <table class="table">
                    <thead><tr><th>ID</th><th>Usuario</th><th>Email</th><th>Rol</th><th>Acción</th></tr></thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.usuario}"></td>
                            <td th:text="${u.email}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${u.rol}"></span></td>
                            <td><a th:href="@{'/admin/usuario/eliminar/' + ${u.id}}" class="btn btn-sm btn-danger">Eliminar</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-proveedores">
            <div class="card shadow-sm p-4">
                <div class="d-flex justify-content-between mb-3">
                    <h3>Proveedores</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProvedor">Añadir Proveedor</button>
                </div>
                <table class="table">
                    <thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Acción</th></tr></thead>
                    <tbody>
                        <tr th:each="p : ${proveedores}">
                            <td th:text="${p.nombre}"></td>
                            <td th:text="${p.correo}"></td>
                            <td th:text="${p.telefono}"></td>
                            <td><a th:href="@{'/admin/provedor/eliminar/' + ${p.id}}" class="btn btn-sm btn-danger">Eliminar</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-zapas">
            <div class="card shadow-sm p-4">
                <div class="d-flex justify-content-between mb-3">
                    <h3>Inventario</h3>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalProducto">Añadir Zapatilla</button>
                </div>
                <table class="table">
                    <thead><tr><th>Nombre</th><th>Marca</th><th>Modelo</th><th>Talla</th><th>Precio</th><th>Acción</th></tr></thead>
                    <tbody>
                        <tr th:each="prod : ${productos}">
                            <td th:text="${prod.nombre}"></td>
                            <td th:text="${prod.marca}"></td>
                            <td th:text="${prod.modelo}"></td>
                            <td th:text="${prod.talla}"></td>
                            <td th:text="${prod.precio} + '€'"></td>
                            <td><a th:href="@{'/admin/producto/eliminar/' + ${prod.id}}" class="btn btn-sm btn-danger">Eliminar</a></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/admin/producto/guardar}" th:object="${nuevoProducto}" method="post" class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nueva Zapatilla</h5></div>
            <div class="modal-body">
                <input type="text" th:field="*{nombre}" class="form-control mb-2" placeholder="Nombre Comercial" required>
                <input type="text" th:field="*{marca}" class="form-control mb-2" placeholder="Marca (Ej: Nike)" required>
                <input type="text" th:field="*{modelo}" class="form-control mb-2" placeholder="Modelo" required>
                <input type="text" th:field="*{talla}" class="form-control mb-2" placeholder="Talla" required>
                <input type="number" step="0.01" th:field="*{precio}" class="form-control mb-2" placeholder="Precio (€)" required>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="modalProvedor" tabindex="-1">
    <div class="modal-dialog">
        <form th:action="@{/admin/provedor/guardar}" th:object="${nuevoProvedor}" method="post" class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nuevo Proveedor</h5></div>
            <div class="modal-body">
                <input type="text" th:field="*{nombre}" class="form-control mb-2" placeholder="Nombre" required>
                <input type="text" th:field="*{direccion}" class="form-control mb-2" placeholder="Dirección">
                <input type="text" th:field="*{telefono}" class="form-control mb-2" placeholder="Teléfono">
                <input type="email" th:field="*{correo}" class="form-control mb-2" placeholder="Email">
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">Guardar</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
