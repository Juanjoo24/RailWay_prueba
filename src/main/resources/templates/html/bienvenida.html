<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <title>ZapaJuan | Panel VIP</title>
    <style>
        :root { --main-dark: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .custom-navbar { background: white; padding: 15px 0; border-bottom: 1px solid #eee; }
        .brand-text { letter-spacing: -1px; font-size: 1.8rem; color: var(--main-dark); font-weight: 800; text-decoration: none; }
        .card { border-radius: 0; transition: all 0.3s ease; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; }
        .card-img-top { height: 250px; object-fit: contain; padding: 20px; background: #fdfdfd; }
        .btn-dark { background: var(--main-dark); border-radius: 0; text-transform: uppercase; font-weight: bold; padding: 12px; border: none; }
        .hero-banner { background: var(--main-dark); color: white; padding: 50px 0; margin-bottom: 40px; text-align: center; }
        .floating-checkout { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top custom-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" th:href="@{/bienvenida}">
                <img th:src="@{/imagenes/logoTienda.png}" alt="Logo" style="height: 50px;">
                <span class="brand-text ms-2">ZAPAJUAN</span>
            </a>
            
            <div class="ms-auto d-flex align-items-center">
                <div class="dropdown">
                    <button class="btn btn-outline-dark rounded-pill px-4 fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-fill me-1"></i>
                        <span th:text="${nombreUsuario}">Usuario</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                        <li><a class="dropdown-item py-2" th:href="@{/confirmacion}"><i class="bi bi-bag-check me-2"></i>Mis Pedidos</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="container">
            <h1 class="display-4 fw-bold">BIENVENIDO DE NUEVO</h1>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row g-4">
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="@{/imagenes/jordan_1_retro.png}" class="card-img-top" alt="Jordan">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Jordan 1 Retro</h5>
                        <p class="fw-bold text-primary fs-5 mt-auto">218.00€</p>
                        <button class="btn btn-dark w-100 btn-add-cart">Añadir a la cesta</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="@{/imagenes/Saucony_ProGrid_Omni_9.jpg}" class="card-img-top" alt="Saucony">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">ProGrid Omni 9</h5>
                        <p class="fw-bold text-primary fs-5 mt-auto">99.30€</p>
                        <button class="btn btn-dark w-100 btn-add-cart">Añadir a la cesta</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="@{/imagenes/arimax.jpg}" class="card-img-top" alt="Nike">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">Nike Air Max 95</h5>
                        <p class="fw-bold text-primary fs-5 mt-auto">203.00€</p>
                        <button class="btn btn-dark w-100 btn-add-cart">Añadir a la cesta</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="btn-finalizar" class="floating-checkout">
        <a th:href="@{/confirmacion}" class="btn btn-primary btn-lg rounded-pill shadow-lg px-5 py-3 fw-bold">
            <i class="bi bi-credit-card-2-back me-2"></i> IR A LA CESTA (<span id="count-final">0</span>)
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/index-tienda.js}"></script>
</body>
</html>
